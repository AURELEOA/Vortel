<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VORTEL.IO | Multiplayer Sandbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --panel: #151515; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; color: white; }
        
        #ui-wrapper { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; text-align: center; }
        #logo { font-size: 60px; font-weight: 900; color: var(--accent); letter-spacing: 8px; margin: 0; }
        
        .play-box { background: var(--panel); padding: 30px; border-radius: 15px; border: 1px solid #333; width: 340px; margin-top: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-play { width: 100%; padding: 20px; background: var(--accent); color: black; border: none; border-radius: 8px; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #game-frame { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <h1 id="logo">VORTEL</h1>
        <div class="play-box">
            <input type="text" id="username" placeholder="Username...">
            <input type="text" id="lobby" placeholder="Lobby Name (e.g. Survival1)">
            <button class="btn-play" onclick="playGame()">PLAY NOW</button>
        </div>
        <p style="color: #444; margin-top: 20px;">[ AD SPACE ]</p>
    </div>

    <iframe id="game-frame" src="https://andyhall.github.io/noa-examples/" allow="fullscreen; pointer-lock"></iframe>

    <script>
        // LOAD SAVED NAME
        window.onload = () => {
            if(localStorage.getItem('v_user')) document.getElementById('username').value = localStorage.getItem('v_user');
        };

        function playGame() {
            const user = document.getElementById('username').value || "Player" + Math.floor(Math.random()*900);
            const lobby = document.getElementById('lobby').value || "Global";
            
            localStorage.setItem('v_user', user);

            // IPAD FULLSCREEN FIX
            const root = document.documentElement;
            if (root.requestFullscreen) root.requestFullscreen();
            else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();

            document.getElementById('ui-wrapper').style.display = 'none';
            const frame = document.getElementById('game-frame');
            frame.style.display = 'block';
            
            // Syncs the room and user to the engine
            frame.contentWindow.postMessage({ type: 'join', room: lobby, name: user }, '*');
            frame.focus();
        }
    </script>
</body>
</html>
